<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT182QjOZmHaUdd56SiVgSFx14YvNEuzOUS7A&s">
    <title>Kivaywa Boys | E-Tally System</title>
    <style>
        :root {
            --maroon: #800000;
            --green: #006400;
            --black: #1a1a1a;
            --white: #ffffff;
            --gray: #f8f9fa;
            --gold: #d4af37;
            --border: #dee2e6;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--gray);
            margin: 0;
            padding: 10px; /* Reduced for mobile */
            color: var(--black);
            line-height: 1.5;
        }

        /* --- NAVIGATION --- */
        .nav-bar {
            max-width: 1200px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            text-decoration: none;
            color: var(--white);
            background: var(--black);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover { background: var(--maroon); transform: translateX(-3px); }

        /* --- CONTAINER --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--maroon);
            padding-bottom: 15px;
            margin-bottom: 25px;
            gap: 15px;
        }

        .header-title h1 { margin: 0; font-size: 1.5rem; color: var(--maroon); }
        .subtitle { color: var(--green); font-weight: 600; font-size: 0.9rem; margin: 0; }

        /* --- CONTROLS --- */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            gap: 15px;
        }

        .select-group { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; }
        
        select {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 1rem;
            background-color: white;
            width: 100%;
            max-width: 400px;
        }

        .btn-print {
            background: var(--green);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            width: 100%; /* Mobile full width */
        }

        @media (min-width: 768px) {
            body { padding: 30px; }
            .header-title h1 { font-size: 2rem; }
            .btn-print { width: auto; }
            .container { padding: 40px; }
        }

        /* --- TABLE RESPONSIVENESS --- */
        .table-wrapper { 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--maroon); color: white; padding: 12px; text-align: left; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .class-col { font-weight: 700; background: #fcfcfc; border-right: 2px solid #eee; }
        
        .vote-input {
            width: 60px;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }

        .vote-input:focus { border-color: var(--green); outline: none; }

        .total-row { background: #fff9e6; font-weight: 800; color: var(--maroon); }

        /* --- WINNER CARD --- */
        .winner-card {
            margin-top: 30px;
            padding: 25px;
            background: var(--black);
            color: white;
            border-radius: 12px;
            display: none;
            text-align: center;
            border-bottom: 6px solid var(--gold);
        }

        .winner-card h2 { margin: 10px 0; color: var(--gold); font-size: 2rem; }

        /* --- PRINT ONLY --- */
        @media print {
            .nav-bar, .action-bar, .vote-input, .tagline { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; }
            .vote-display-print { display: block !important; font-size: 1.2rem; font-weight: bold; }
            .winner-card { display: block !important; background: white !important; color: black !important; border: 2px solid black; }
        }

        .vote-display-print { display: none; }

        /* Loading Spinner */
        #loader { text-align: center; padding: 20px; display: block; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="dash.html" class="back-btn">← DASHBOARD</a>
    </nav>

    <div class="container">
        <header>
            <div class="header-title">
                <h1>Official Election Tally</h1>
                <p class="subtitle">Kivaywa Boys Senior School | Management System</p>
            </div>
            <div style="text-align: right; font-size: 0.9rem;">
                <strong>Date:</strong> <span id="currentDate"></span>
            </div>
        </header>

        <div id="loader">Retrieving encrypted data from server...</div>

        <div class="action-bar">
            <div class="select-group">
                <label><strong>Select Elective Post:</strong></label>
                <select id="postFilter" onchange="renderTallyTable()">
                    <option value="">-- Choose Office --</option>
                </select>
            </div>
            <button class="btn-print" onclick="window.print()" id="printBtn" disabled>
                🖨️ Generate Official Report
            </button>
        </div>

        <div id="tallyArea" class="table-wrapper">
            <div style="text-align: center; padding: 40px; color: #666;">
                <p>Please select a post to view live tallies.</p>
            </div>
        </div>

        <div id="winnerDisplay" class="winner-card">
            <small style="text-transform: uppercase; letter-spacing: 2px; color: #aaa;">Projected Winner</small>
            <h2 id="winnerName">-</h2>
            <div id="winnerVotes">0 Total Accumulated Votes</div>
        </div>

        <div class="tagline" style="text-align: center; margin-top: 40px; color: #bbb; font-size: 0.65rem; letter-spacing: 3px;">
            SECURE ENTERPRISE SYSTEM • KIVAYWA BOYS ELECTORAL COMMISSION
        </div>
    </div>

    <script>
        const API_BASE = 'https://kbhs.onrender.com/api';
        let candidates = [];
        let classes = [];
        let results = {};

        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-KE', {
            day: 'numeric', month: 'long', year: 'numeric'
        });

        async function init() {
            const loader = document.getElementById('loader');
            try {
                // Fetch data with error handling for each
                const [candRes, classRes, voteRes] = await Promise.all([
                    fetch(`${API_BASE}/candidates`).then(r => r.json()),
                    fetch(`${API_BASE}/classes`).then(r => r.json()),
                    fetch(`${API_BASE}/results`).then(r => r.json())
                ]);

                candidates = candRes;
                classes = classRes;
                
                // Map results by key for O(1) lookup
                voteRes.forEach(v => { 
                    if(v.resultKey) results[v.resultKey] = v.votes; 
                });

                const postFilter = document.getElementById('postFilter');
                const uniquePosts = [...new Set(candidates.map(c => c.post))];
                
                uniquePosts.forEach(post => {
                    postFilter.add(new Option(post, post));
                });

                loader.style.display = 'none';
            } catch (err) {
                console.error("Critical System Failure:", err);
                loader.innerHTML = `<b style="color:red">Connection Error: Could not reach the tally server.</b>`;
            }
        }

        function renderTallyTable() {
            const post = document.getElementById('postFilter').value;
            const tallyArea = document.getElementById('tallyArea');
            const printBtn = document.getElementById('printBtn');
            
            if (!post) {
                tallyArea.innerHTML = `<div style="text-align:center;padding:40px;">Select a post to display data.</div>`;
                printBtn.disabled = true;
                document.getElementById('winnerDisplay').style.display = 'none';
                return;
            }

            printBtn.disabled = false;
            const filteredCands = candidates.filter(c => c.post === post);

            let html = `<table><thead><tr><th>Class Stream</th>`;
            filteredCands.forEach(c => { html += `<th>${c.name}</th>`; });
            html += `</tr></thead><tbody>`;

            classes.forEach((cls) => {
                html += `<tr><td class="class-col">${cls.className}</td>`;
                filteredCands.forEach((c, idx) => {
                    const rKey = `${post}_${c.name}_${cls.className}`;
                    const val = results[rKey] || 0;
                    html += `<td>
                        <span class="vote-display-print">${val}</span>
                        <input type="number" class="vote-input" 
                               oninput="saveVote('${rKey}', this.value)" 
                               data-idx="${idx}" value="${val}" min="0">
                    </td>`;
                });
                html += `</tr>`;
            });

            // Aggregate Row
            html += `<tr class="total-row"><td>TOTALS</td>`;
            filteredCands.forEach((_, i) => { html += `<td id="total-${i}" style="font-size:1.2rem;">0</td>`; });
            html += `</tr></tbody></table>`;

            tallyArea.innerHTML = html;
            document.getElementById('winnerDisplay').style.display = 'block';
            calculateTotals();
        }

        // Debounce or immediate save
        async function saveVote(key, val) {
            const votes = parseInt(val) || 0;
            results[key] = votes;
            calculateTotals(); // Visual update first for UX

            try {
                await fetch(`${API_BASE}/results`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resultKey: key, votes })
                });
            } catch (e) {
                console.warn("Background sync failed. Data cached locally.");
            }
        }

        function calculateTotals() {
            const post = document.getElementById('postFilter').value;
            const filteredCands = candidates.filter(c => c.post === post);
            const inputs = document.querySelectorAll('.vote-input');
            let totals = new Array(filteredCands.length).fill(0);

            inputs.forEach(input => {
                const idx = parseInt(input.dataset.idx);
                totals[idx] += (parseInt(input.value) || 0);
            });

            let topVotes = -1;
            let winner = "";
            let isTie = false;

            totals.forEach((t, i) => {
                const cell = document.getElementById(`total-${i}`);
                if(cell) cell.innerText = t;
                
                if (t > topVotes) {
                    topVotes = t;
                    winner = filteredCands[i].name;
                    isTie = false;
                } else if (t === topVotes && t > 0) {
                    isTie = true;
                }
            });

            const winnerHeading = document.getElementById('winnerName');
            if (topVotes <= 0) {
                winnerHeading.innerText = "Awaiting Data";
            } else if (isTie) {
                winnerHeading.innerText = "Draw / Tie";
            } else {
                winnerHeading.innerText = winner;
            }
            
            document.getElementById('winnerVotes').innerText = `${topVotes} Verified Votes`;
        }

        init();
    </script>
</body>
</html>
