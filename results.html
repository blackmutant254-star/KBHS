<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT182QjOZmHaUdd56SiVgSFx14YvNEuzOUS7A&s">

    <title>Kivaywa Boys | Live Tally</title>
    <style>
        :root {
            --maroon: #800000;
            --green: #006400;
            --black: #0a0a0a;
            --white: #ffffff;
            --gray: #f4f7f6;
            --gold: #d4af37;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--gray);
            margin: 0;
            padding: 20px;
            color: var(--black);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: var(--white);
            background: var(--black);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 1000;
            transition: 0.3s;
        }

        .back-btn:hover { background: var(--maroon); transform: scale(1.05); }

        .container {
            max-width: 1100px;
            margin: 60px auto;
            background: var(--white);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 4px solid var(--maroon);
            padding-bottom: 20px;
        }

        h1 { text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .subtitle { color: var(--green); font-weight: bold; }

        .control-panel {
            display: flex;
            gap: 20px;
            background: #f0f0f0;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            align-items: center;
            justify-content: center;
            border: 1px solid #ddd;
        }

        select {
            padding: 12px 25px;
            border-radius: 10px;
            border: 2px solid var(--maroon);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }

        .table-wrapper { overflow-x: auto; margin-top: 20px; min-height: 200px; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }

        th {
            background: var(--black);
            color: white;
            padding: 15px;
            text-align: left;
            font-size: 0.9rem;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .class-col { font-weight: bold; color: var(--green); width: 150px; background: #f9f9f9; }

        .vote-input {
            width: 80px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .vote-input:focus { 
            border-color: var(--green); 
            outline: none; 
            background: #e8f5e9;
            box-shadow: 0 0 5px rgba(0,100,0,0.2);
        }

        .total-row {
            background: #fff8e1;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--maroon);
        }

        .winner-card {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, var(--maroon), #400000);
            color: white;
            border-radius: 20px;
            text-align: center;
            display: none;
            box-shadow: 0 10px 20px rgba(128,0,0,0.3);
            border: 2px solid var(--gold);
        }

        .winner-card p { margin: 0; font-size: 0.8rem; opacity: 0.8; letter-spacing: 2px; }
        .winner-card h2 { margin: 10px 0; color: var(--gold); font-size: 2rem; }

        .tagline { text-align: center; margin-top: 50px; color: #bbb; letter-spacing: 3px; font-weight: bold; font-size: 0.8rem;}
    </style>
</head>
<body>

    <a href="dash.html" class="back-btn">← DASHBOARD</a>

    <div class="container">
        <header>
            <h1>Election Tally Center</h1>
            <p class="subtitle">Kivaywa Boys Senior School | Live Results</p>
        </header>

        <div class="control-panel">
            <label><strong>Viewing Post:</strong></label>
            <select id="postFilter" onchange="renderTallyTable()">
                <option value="">-- Choose Position --</option>
            </select>
        </div>

        <div id="tallyArea" class="table-wrapper">
            <div style="text-align: center; padding: 40px; color: #888;">
                <p>Please select a position to start the tallying process.</p>
                <small>Data is pulled from <strong>canreg.html</strong> and <strong>classreg.html</strong></small>
            </div>
        </div>

        <div id="winnerDisplay" class="winner-card">
            <p>CURRENT FRONT RUNNER</p>
            <h2 id="winnerName">Candidate Name</h2>
            <div id="winnerVotes" style="font-weight: bold; font-size: 1.2rem;">0 Total Votes</div>
        </div>

        <div class="tagline">KNOWLEDGE IS IMMORTAL</div>
    </div>

    <script>
        // Fetch data from your other pages
        let savedCandidates = JSON.parse(localStorage.getItem('candidates')) || [];
        let savedClasses = JSON.parse(localStorage.getItem('classes')) || [];
        
        // Results storage: { "PostName": { "CandidateID-ClassID": value } }
        let voteResults = JSON.parse(localStorage.getItem('electionResults')) || {};

        // 1. Populate Dropdown with Unique Posts
        const postFilter = document.getElementById('postFilter');
        const uniquePosts = [...new Set(savedCandidates.map(c => c.post))];
        
        uniquePosts.forEach(post => {
            let opt = document.createElement('option');
            opt.value = post;
            opt.innerText = post;
            postFilter.appendChild(opt);
        });

        // 2. Render the Table
        function renderTallyTable() {
            const post = postFilter.value;
            const tallyArea = document.getElementById('tallyArea');
            const winnerDisplay = document.getElementById('winnerDisplay');
            
            if (!post) {
                tallyArea.innerHTML = '<p style="text-align: center; color: #999;">Select a position to begin.</p>';
                winnerDisplay.style.display = "none";
                return;
            }

            const candidatesForPost = savedCandidates.filter(c => c.post === post);
            
            if (candidatesForPost.length === 0) {
                tallyArea.innerHTML = "<p style='text-align:center;'>No candidates found for this post.</p>";
                return;
            }

            let html = `<table><thead><tr><th>Class / Stream</th>`;
            candidatesForPost.forEach(c => {
                html += `<th>${c.name}</th>`;
            });
            html += `</tr></thead><tbody>`;

            savedClasses.forEach((className, classIndex) => {
                html += `<tr><td class="class-col">${className}</td>`;
                candidatesForPost.forEach((c, candIndex) => {
                    // Unique key for this specific input box
                    const storageKey = `${post}_${c.name}_${className}`;
                    const val = voteResults[storageKey] || 0;

                    html += `<td>
                        <input type="number" class="vote-input" 
                               data-cand="${candIndex}" 
                               data-key="${storageKey}"
                               value="${val}" min="0" 
                               oninput="updateVote('${storageKey}', this.value)">
                    </td>`;
                });
                html += `</tr>`;
            });

            // Footer for totals
            html += `<tr class="total-row"><td>TOTAL</td>`;
            candidatesForPost.forEach((c, candIndex) => {
                html += `<td id="total-cand-${candIndex}">0</td>`;
            });
            html += `</tr></tbody></table>`;

            tallyArea.innerHTML = html;
            winnerDisplay.style.display = "block";
            calculateTotals();
        }

        // 3. Handle Input and Save to LocalStorage
        function updateVote(key, value) {
            voteResults[key] = parseInt(value) || 0;
            localStorage.setItem('electionResults', JSON.stringify(voteResults));
            calculateTotals();
        }

        // 4. Sum up columns and find the leader
        function calculateTotals() {
            const post = postFilter.value;
            const candidatesForPost = savedCandidates.filter(c => c.post === post);
            const inputs = document.querySelectorAll('.vote-input');
            let totals = new Array(candidatesForPost.length).fill(0);

            inputs.forEach(input => {
                const candIdx = parseInt(input.getAttribute('data-cand'));
                const val = parseInt(input.value) || 0;
                totals[candIdx] += val;
            });

            let maxVotes = -1;
            let leaderName = "";

            totals.forEach((total, idx) => {
                document.getElementById(`total-cand-${idx}`).innerText = total;
                if (total > maxVotes) {
                    maxVotes = total;
                    leaderName = candidatesForPost[idx].name;
                }
            });

            // Update Winner Card
            if (maxVotes > 0) {
                document.getElementById('winnerName').innerText = leaderName;
                document.getElementById('winnerVotes').innerText = maxVotes + " Total Votes";
            } else {
                document.getElementById('winnerName').innerText = "Waiting for Votes...";
                document.getElementById('winnerVotes').innerText = "0 Total Votes";
            }
        }
    </script>
</body>
</html>
