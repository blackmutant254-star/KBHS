<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT182QjOZmHaUdd56SiVgSFx14YvNEuzOUS7A&s">
    <title>Kivaywa Boys | Enterprise Tally System</title>
    <style>
        :root {
            --maroon: #800000;
            --green: #006400;
            --black: #0a0a0a;
            --white: #ffffff;
            --gray: #f4f7f6;
            --gold: #d4af37;
            --border: #e0e0e0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--gray);
            margin: 0;
            padding: 20px;
            color: var(--black);
        }

        /* --- UI COMPONENTS --- */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: var(--white);
            background: var(--black);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            z-index: 1000;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover { background: var(--maroon); }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--maroon);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header-title h1 { margin: 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { color: var(--green); font-weight: 600; margin-top: 5px; }

        /* --- CONTROLS --- */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .select-group { display: flex; align-items: center; gap: 15px; }
        
        select {
            padding: 10px 20px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 1rem;
            font-weight: 500;
            min-width: 250px;
        }

        .btn-print {
            background: var(--green);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .btn-print:hover { background: #004d00; transform: translateY(-1px); }
        .btn-print:disabled { background: #ccc; cursor: not-allowed; }

        /* --- TABLE STYLE --- */
        .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f1f1f1; color: var(--black); padding: 15px; text-align: left; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        
        .class-col { font-weight: 700; color: var(--maroon); background: #fafafa; border-right: 1px solid #eee; }
        
        .vote-input {
            width: 70px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
        }

        .total-row { background: #fffdf2; font-weight: 800; color: var(--maroon); font-size: 1.1rem; }

        /* --- WINNER CARD --- */
        .winner-card {
            margin-top: 30px;
            padding: 20px;
            background: var(--black);
            color: white;
            border-radius: 8px;
            display: none;
            border-left: 10px solid var(--gold);
        }

        .winner-card h2 { margin: 5px 0; color: var(--gold); }

        /* --- PRINT ONLY STYLES --- */
        @media print {
            .back-btn, .action-bar, .vote-input, .back-btn, .tagline { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; width: 100%; max-width: 100%; margin: 0; padding: 0; }
            .vote-display-print { display: block !important; font-weight: bold; }
            input { display: none; }
            .winner-card { display: block !important; background: white !important; color: black !important; border: 1px solid black; }
            .winner-card h2 { color: black !important; }
        }

        .vote-display-print { display: none; }
    </style>
</head>
<body>

    <a href="dash.html" class="back-btn"><span>←</span> DASHBOARD</a>

    <div class="container" id="printableArea">
        <header>
            <div class="header-title">
                <h1>Official Election Tally</h1>
                <p class="subtitle">Kivaywa Boys Senior School | Management System</p>
            </div>
            <div style="text-align: right; font-size: 0.8rem; color: #666;">
                Date: <span id="currentDate"></span>
            </div>
        </header>

        <div class="action-bar">
            <div class="select-group">
                <label><strong>Post Jurisdiction:</strong></label>
                <select id="postFilter" onchange="renderTallyTable()">
                    <option value="">-- Select Office --</option>
                </select>
            </div>
            <button class="btn-print" onclick="window.print()" id="printBtn" disabled>
                🖨️ Print Results Report
            </button>
        </div>

        <div id="tallyArea" class="table-wrapper">
            <div style="text-align: center; padding: 60px; color: #999;">
                <p>Awaiting administrative selection of elective post...</p>
            </div>
        </div>

        <div id="winnerDisplay" class="winner-card">
            <small style="text-transform: uppercase; letter-spacing: 2px;">Presumptive Winner</small>
            <h2 id="winnerName">-</h2>
            <div id="winnerVotes">0 Total Accumulated Votes</div>
        </div>

        <div class="tagline" style="text-align: center; margin-top: 40px; color: #ccc; font-size: 0.7rem; letter-spacing: 4px;">
            VERIFIED BY KIVAYWA BOYS ELECTORAL BOARD
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let candidates = [];
        let classes = [];
        let results = {};

        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-GB', {
            day: 'numeric', month: 'long', year: 'numeric'
        });

        async function init() {
            try {
                const [candRes, classRes, voteRes] = await Promise.all([
                    fetch(`${API_BASE}/candidates`),
                    fetch(`${API_BASE}/classes`),
                    fetch(`${API_BASE}/results`)
                ]);

                candidates = await candRes.json();
                classes = await classRes.json();
                const rawVotes = await voteRes.json();
                
                rawVotes.forEach(v => { results[v.resultKey] = v.votes; });

                const postFilter = document.getElementById('postFilter');
                const uniquePosts = [...new Set(candidates.map(c => c.post))];
                uniquePosts.forEach(post => {
                    let opt = new Option(post, post);
                    postFilter.add(opt);
                });
            } catch (err) {
                console.error("System Initialization Failed", err);
            }
        }

        function renderTallyTable() {
            const post = document.getElementById('postFilter').value;
            const tallyArea = document.getElementById('tallyArea');
            const printBtn = document.getElementById('printBtn');
            
            if (!post) {
                printBtn.disabled = true;
                return;
            }

            printBtn.disabled = false;
            const filteredCands = candidates.filter(c => c.post === post);

            let html = `<table><thead><tr><th>Stream / Unit</th>`;
            filteredCands.forEach(c => { html += `<th>${c.name}</th>`; });
            html += `</tr></thead><tbody>`;

            classes.forEach((cls) => {
                html += `<tr><td class="class-col">${cls.className}</td>`;
                filteredCands.forEach((c, idx) => {
                    const rKey = `${post}_${c.name}_${cls.className}`;
                    const val = results[rKey] || 0;
                    html += `<td>
                        <span class="vote-display-print">${val}</span>
                        <input type="number" class="vote-input" 
                               onchange="saveVote('${rKey}', this.value)" 
                               data-idx="${idx}" value="${val}">
                    </td>`;
                });
                html += `</tr>`;
            });

            html += `<tr class="total-row"><td>AGGREGATE</td>`;
            filteredCands.forEach((_, i) => { html += `<td id="total-${i}">0</td>`; });
            html += `</tr></tbody></table>`;

            tallyArea.innerHTML = html;
            document.getElementById('winnerDisplay').style.display = 'block';
            calculateTotals();
        }

        async function saveVote(key, val) {
            const votes = parseInt(val) || 0;
            results[key] = votes;
            try {
                await fetch(`${API_BASE}/results`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resultKey: key, votes })
                });
                calculateTotals();
            } catch (e) { alert("Sync Error"); }
        }

        function calculateTotals() {
            const post = document.getElementById('postFilter').value;
            const filteredCands = candidates.filter(c => c.post === post);
            const inputs = document.querySelectorAll('.vote-input');
            let totals = new Array(filteredCands.length).fill(0);

            inputs.forEach(input => {
                const idx = parseInt(input.dataset.idx);
                totals[idx] += (parseInt(input.value) || 0);
            });

            let topVotes = -1;
            let winner = "";

            totals.forEach((t, i) => {
                document.getElementById(`total-${i}`).innerText = t;
                if (t > topVotes) { topVotes = t; winner = filteredCands[i].name; }
            });

            document.getElementById('winnerName').innerText = topVotes > 0 ? winner : "Tallying...";
            document.getElementById('winnerVotes').innerText = `${topVotes} Verified Votes`;
        }

        init();
    </script>
</body>
</html>
