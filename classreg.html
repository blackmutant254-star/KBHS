<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT182QjOZmHaUdd56SiVgSFx14YvNEuzOUS7A&s">

    <title>Kivaywa Boys | Class Registry</title>
    <style>
        :root {
            --maroon: #800000;
            --green: #006400;
            --black: #1a1a1a;
            --gray: #f8f9fa;
            --white: #ffffff;
            --border: #dee2e6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: var(--black);
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: var(--white);
            padding: 10px 15px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .back-btn:hover {
            color: var(--maroon);
            transform: translateX(-5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .back-btn span {
            margin-right: 8px;
            font-size: 1.2rem;
        }

        .registry-container {
            width: 95%;
            max-width: 500px;
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-top: 8px solid var(--green);
        }

        h2 {
            color: var(--black);
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: var(--maroon);
            font-weight: 600;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--black);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background: #fafafa;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--green);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 100, 0, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 16px;
            background-color: var(--green);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-register:hover {
            background-color: #004d00;
            transform: translateY(-2px);
        }

        .class-list {
            margin-top: 40px;
            border-top: 2px dashed var(--border);
            padding-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .class-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--gray);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid var(--maroon);
            animation: fadeIn 0.3s ease;
        }

        .class-name {
            font-weight: 700;
            color: var(--black);
            font-size: 1rem;
        }

        .tagline {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: #bbb;
            letter-spacing: 3px;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <a href="dash.html" class="back-btn">
        <span>←</span> Back to Dashboard
    </a>

    <div class="registry-container">
        <h2>Class Registry</h2>
        <p class="subtitle">Kivaywa Boys Senior School</p>

        <div class="input-group">
            <label>Class Name</label>
            <input type="text" id="className" placeholder="e.g. Form 4 North" onkeypress="handleKeyPress(event)">
        </div>

        <button class="btn-register" onclick="registerClass()">Register Class</button>

        <div class="class-list" id="classListDisplay">
            <h3 style="font-size: 1rem; margin-bottom: 15px; color: var(--black);">Registered Classes:</h3>
        </div>

        <div class="tagline">KNOWLEDGE IS IMMORTAL</div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/classes';

        // Load data from MongoDB on startup
        async function fetchClasses() {
            try {
                const response = await fetch(API_URL);
                const classes = await response.json();
                updateUI(classes);
            } catch (err) {
                console.error("Failed to load classes:", err);
            }
        }

        async function registerClass() {
            const input = document.getElementById('className');
            const name = input.value.trim();

            if (name === "") {
                alert("Please enter a class name.");
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ className: name })
                });

                if (response.ok) {
                    input.value = '';
                    input.focus();
                    fetchClasses(); // Refresh list from server
                } else {
                    const data = await response.json();
                    alert(data.message || "Error adding class.");
                }
            } catch (err) {
                alert("Server connection failed.");
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                registerClass();
            }
        }

        function updateUI(classes) {
            const display = document.getElementById('classListDisplay');
            display.innerHTML = '<h3 style="font-size: 1rem; margin-bottom: 15px; color: var(--black);">Registered Classes:</h3>';

            classes.forEach((cls) => {
                const div = document.createElement('div');
                div.className = 'class-item';
                div.innerHTML = `
                    <span class="class-name">${cls.className}</span>
                    <button onclick="removeClass('${cls._id}')" style="background:none; border:none; color:#dc3545; font-size: 1.2rem; cursor:pointer;">&times;</button>
                `;
                display.appendChild(div);
            });
        }

        async function removeClass(id) {
            if (confirm("Remove this class?")) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        fetchClasses();
                    }
                } catch (err) {
                    alert("Failed to delete.");
                }
            }
        }

        // Run on page load
        fetchClasses();
    </script>
</body>
</html>
