<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT182QjOZmHaUdd56SiVgSFx14YvNEuzOUS7A&s">
    <title>Kivaywa Boys | Class Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --maroon: #800000;
            --maroon-light: #fff1f1;
            --green: #006400;
            --green-light: #f0fdf4;
            --black: #0f172a;
            --slate-500: #64748b;
            --slate-200: #e2e8f0;
            --white: #ffffff;
            --danger: #ef4444;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(0, 100, 0, 0.05) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(128, 0, 0, 0.05) 0px, transparent 50%);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- NAVIGATION --- */
        nav {
            width: 100%;
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--slate-200);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-link {
            text-decoration: none;
            color: var(--slate-500);
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--maroon); }

        /* --- CONTAINER --- */
        .registry-wrapper {
            width: 95%;
            max-width: 550px;
            margin: 40px 0;
        }

        .header-box {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-box h2 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--black);
        }

        .header-box .subtitle {
            color: var(--maroon);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- MAIN CARD --- */
        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--slate-200);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--slate-500);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1.5px solid var(--slate-200);
            font-size: 1rem;
            transition: 0.2s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 4px rgba(0, 100, 0, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 16px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-register:hover {
            background: #004d00;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 64, 0, 0.2);
        }

        /* --- LIST SECTION --- */
        .list-section {
            margin-top: 32px;
            border-top: 1px solid var(--slate-200);
            padding-top: 24px;
        }

        .list-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--black);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .class-list-container {
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .class-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 14px 20px;
            border-radius: 14px;
            margin-bottom: 10px;
            border: 1px solid transparent;
            transition: 0.2s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .class-item:hover {
            background: white;
            border-color: var(--slate-200);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .class-name { font-weight: 600; color: var(--black); }

        .del-btn {
            background: none;
            border: none;
            color: var(--slate-500);
            font-size: 1.1rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .del-btn:hover {
            background: var(--maroon-light);
            color: var(--danger);
        }

        /* --- TOAST --- */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--black);
            color: white;
            padding: 16px 24px;
            border-radius: 16px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999;
        }

        #toast.show { transform: translateX(0); }

        /* --- MODAL --- */
        #modalOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            display: none; justify-content: center; align-items: center;
            z-index: 3000; backdrop-filter: blur(8px);
        }

        .modal {
            background: white;
            padding: 32px;
            border-radius: 24px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .modal i { font-size: 3rem; color: var(--danger); margin-bottom: 16px; }

        .modal-btns { display: flex; gap: 12px; margin-top: 24px; }
        .modal-btns button { 
            flex: 1; padding: 12px; border-radius: 12px; border: none; 
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }

        .btn-confirm { background: var(--danger); color: white; }
        .btn-confirm:hover { background: #b91c1c; }

        .tagline { text-align: center; margin-top: 40px; font-size: 0.7rem; color: var(--slate-500); letter-spacing: 4px; font-weight: 800; opacity: 0.5; }
    </style>
</head>
<body>

    <nav>
        <a href="dash.html" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT182QjOZmHaUdd56SiVgSFx14YvNEuzOUS7A&s" height="30" alt="Logo">
    </nav>

    <div class="registry-wrapper">
        <div class="header-box">
            <p class="subtitle">Official Records</p>
            <h2>Class <span style="color:var(--green)">Registry</span></h2>
        </div>

        <div class="card">
            <div class="input-group">
                <label>Register New Class</label>
                <input type="text" id="className" placeholder="e.g. Form 4 North" onkeypress="handleKeyPress(event)">
            </div>

            <button class="btn-register" onclick="registerClass()">
                <i class="fas fa-plus-circle"></i> Save to Registry
            </button>

            <div class="list-section">
                <div class="list-title">
                    <i class="fas fa-list-ul" style="color:var(--green)"></i>
                    Registered Classes
                </div>
                <div class="class-list-container" id="classListDisplay">
                    </div>
            </div>
        </div>

        <div class="tagline">KNOWLEDGE IS IMMORTAL</div>
    </div>

    <div id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg"></span></div>

    <div id="modalOverlay">
        <div class="modal">
            <i class="fas fa-trash-can"></i>
            <h3 style="font-size: 1.4rem; margin-bottom: 8px;">Delete Class?</h3>
            <p style="color: var(--slate-500); font-size: 0.95rem;">This will permanently remove the class from the server records.</p>
            <div class="modal-btns">
                <button style="background: var(--slate-200);" onclick="closeModal()">Keep it</button>
                <button class="btn-confirm" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://kbhs.onrender.com/api/classes';
        let pendingDeleteId = null;

        function notify(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function openModal(id) {
            pendingDeleteId = id;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            pendingDeleteId = null;
        }

        document.getElementById('confirmDeleteBtn').onclick = function() {
            if (pendingDeleteId) executeDelete(pendingDeleteId);
            closeModal();
        };

        async function fetchClasses() {
            try {
                const response = await fetch(API_URL);
                const classes = await response.json();
                updateUI(classes);
            } catch (err) {
                console.error("Load failed");
            }
        }

        async function registerClass() {
            const input = document.getElementById('className');
            const name = input.value.trim();
            if (!name) return notify("Please enter a class name");

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ className: name })
                });

                if (response.ok) {
                    input.value = '';
                    notify("Class registered!");
                    fetchClasses();
                } else {
                    notify("Class already exists");
                }
            } catch (err) { notify("Server error"); }
        }

        async function executeDelete(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    notify("Class deleted");
                    fetchClasses();
                } else { notify("Delete failed"); }
            } catch (err) { notify("Connection failed"); }
        }

        function updateUI(classes) {
            const display = document.getElementById('classListDisplay');
            display.innerHTML = '';

            if (classes.length === 0) {
                display.innerHTML = '<p style="text-align:center; color:#94a3b8; padding: 20px; font-size:0.8rem;">No classes registered yet.</p>';
                return;
            }

            classes.forEach((cls) => {
                const div = document.createElement('div');
                div.className = 'class-item';
                div.innerHTML = `
                    <span class="class-name">${cls.className}</span>
                    <button class="del-btn" onclick="openModal('${cls._id}')">
                        <i class="far fa-trash-alt"></i>
                    </button>
                `;
                display.appendChild(div);
            });
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") registerClass();
        }

        fetchClasses();
    </script>
</body>
</html>
