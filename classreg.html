<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT182QjOZmHaUdd56SiVgSFx14YvNEuzOUS7A&s">

    <title>Kivaywa Boys | Class Registry</title>
    <style>
        :root {
            --maroon: #800000;
            --green: #006400;
            --black: #1a1a1a;
            --gray: #f8f9fa;
            --white: #ffffff;
            --border: #dee2e6;
            --danger: #dc3545;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* --- UI COMPONENTS --- */
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: var(--black);
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: var(--white);
            padding: 10px 15px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .back-btn:hover { color: var(--maroon); transform: translateX(-5px); }

        .registry-container {
            width: 95%;
            max-width: 500px;
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-top: 8px solid var(--green);
        }

        h2 { color: var(--black); text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { text-align: center; color: var(--maroon); font-weight: 600; margin-bottom: 30px; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background: #fafafa;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { outline: none; border-color: var(--green); background: #fff; }

        .btn-register {
            width: 100%;
            padding: 16px;
            background-color: var(--green);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .class-list {
            margin-top: 40px;
            border-top: 2px dashed var(--border);
            padding-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .class-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--gray);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid var(--maroon);
        }

        /* --- APP NOTIFICATIONS (TOAST) --- */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--black);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        /* --- CUSTOM CONFIRM MODAL --- */
        #modalOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 320px;
            text-align: center;
        }

        .modal h3 { margin-bottom: 10px; font-size: 1.1rem; }
        .modal p { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
        .btn-cancel { background: var(--gray); color: var(--black); }
        .btn-confirm { background: var(--danger); color: white; }

        .tagline { text-align: center; margin-top: 30px; font-size: 0.8rem; color: #bbb; letter-spacing: 3px; font-weight: bold; }
    </style>
</head>
<body>

    <a href="dash.html" class="back-btn"><span>←</span> Back to Dashboard</a>

    <div class="registry-container">
        <h2>Class Registry</h2>
        <p class="subtitle">Kivaywa Boys Senior School</p>

        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-weight:600;">Class Name</label>
            <input type="text" id="className" placeholder="e.g. Form 4 North" onkeypress="handleKeyPress(event)">
        </div>

        <button class="btn-register" onclick="registerClass()">Register Class</button>

        <div class="class-list" id="classListDisplay">
            <h3 style="font-size: 1rem; margin-bottom: 15px; color: var(--black);">Registered Classes:</h3>
        </div>

        <div class="tagline">KNOWLEDGE IS IMMORTAL</div>
    </div>

    <div id="toast">Message here</div>

    <div id="modalOverlay">
        <div class="modal">
            <h3>Confirm Action</h3>
            <p>Are you sure you want to remove this class?</p>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" id="confirmDeleteBtn">Remove</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://kbhs.onrender.com/api/classes';
        let pendingDeleteId = null;

        // Custom Notification Function
        function notify(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        // Custom Modal Logic
        function openModal(id) {
            pendingDeleteId = id;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            pendingDeleteId = null;
        }

        document.getElementById('confirmDeleteBtn').onclick = function() {
            if (pendingDeleteId) executeDelete(pendingDeleteId);
            closeModal();
        };

        async function fetchClasses() {
            try {
                const response = await fetch(API_URL);
                const classes = await response.json();
                updateUI(classes);
            } catch (err) {
                console.error("Load failed");
            }
        }

        async function registerClass() {
            const input = document.getElementById('className');
            const name = input.value.trim();

            if (!name) {
                notify("Please enter a name");
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ className: name })
                });

                if (response.ok) {
                    input.value = '';
                    notify("Class registered successfully!");
                    fetchClasses();
                } else {
                    notify("Error saving class");
                }
            } catch (err) {
                notify("Server error");
            }
        }

        async function executeDelete(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    notify("Class removed from registry");
                    fetchClasses();
                } else {
                    notify("Could not delete");
                }
            } catch (err) {
                notify("Connection failed");
            }
        }

        function updateUI(classes) {
            const display = document.getElementById('classListDisplay');
            display.innerHTML = '<h3 style="font-size: 1rem; margin-bottom: 15px; color: var(--black);">Registered Classes:</h3>';

            classes.forEach((cls) => {
                const div = document.createElement('div');
                div.className = 'class-item';
                div.innerHTML = `
                    <span class="class-name">${cls.className}</span>
                    <button onclick="openModal('${cls._id}')" style="background:none; border:none; color:var(--danger); font-size: 1.2rem; cursor:pointer;">&times;</button>
                `;
                display.appendChild(div);
            });
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") registerClass();
        }

        fetchClasses();
    </script>
</body>
</html>
