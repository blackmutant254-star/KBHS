<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT182QjOZmHaUdd56SiVgSFx14YvNEuzOUS7A&s">
    <title>Kivaywa Boys | Election Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --maroon: #800000;
            --maroon-hover: #5d0000;
            --green: #006400;
            --black: #0f172a;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.95);
            --border: #e2e8f0;
            --danger: #e11d48;
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(at top left, #f8fafc, #f1f5f9);
            color: var(--black);
            padding: 20px;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 1000px; margin: 0 auto; }

        /* --- TOAST --- */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 10000; }
        .toast {
            background: var(--black);
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- MODAL --- */
        #modalOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }
        .modal { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }

        /* --- UI ELEMENTS --- */
        .card { background: var(--glass); border-radius: 24px; padding: 30px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid var(--white); margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        
        header h2 { color: var(--maroon); font-weight: 800; font-size: 1.8rem; text-align: center; }
        .subtitle { color: var(--green); text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: 800; text-align: center; display: block; }

        .btn { cursor: pointer; border-radius: 12px; font-weight: 700; padding: 14px; transition: 0.3s; border: none; font-size: 0.9rem; }
        .btn-maroon { background: var(--maroon); color: white; width: 100%; }
        .btn-green { background: var(--green); color: white; width: 100%; }
        .btn:active { transform: scale(0.98); }

        label { font-size: 0.7rem; font-weight: 800; color: #64748b; margin-bottom: 5px; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--border); outline: none; transition: 0.2s; }
        input:focus { border-color: var(--maroon); }

        .scroll-list { max-height: 300px; overflow-y: auto; background: #fff; border-radius: 14px; padding: 10px; border: 1px solid var(--border); margin-top: 15px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .list-item:last-child { border-bottom: none; }
        .del-btn { color: var(--danger); cursor: pointer; font-size: 1.4rem; line-height: 1; }

        @media (max-width: 850px) { .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <a href="dash.html" class="back-btn"><span>←</span> Back to Dashboard</a>
    <div id="toast-container"></div>

    <div id="modalOverlay">
        <div class="modal">
            <h3>Confirm Deletion</h3>
            <p style="color: #64748b; margin: 10px 0;">This will permanently remove the record from the server.</p>
            <div class="modal-btns">
                <button style="background:#e2e8f0" onclick="closeModal()">Cancel</button>
                <button style="background:var(--danger); color:white" id="confirmBtn">Confirm</button>
            </div>
        </div>
    </div>

    <div class="container">
        <header class="card">
            <h2>ELECTION PORTAL</h2>
            <span class="subtitle">Official Admin Registry</span>
        </header>

        <div class="admin-grid">
            <div class="card">
                <h3 style="font-size: 1rem; color: var(--green)">Position Registry</h3>
                <label>NEW POSITION NAME</label>
                <input type="text" id="postInput" placeholder="e.g. School Captain">
                <button class="btn btn-green" onclick="savePost()" style="margin-top: 10px;">Register Position</button>
                
                <div class="scroll-list" id="postList"></div>
            </div>

            <div class="card">
                <h3 style="font-size: 1rem; color: var(--maroon)">Candidate Registry</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label>FULL NAME</label>
                        <input type="text" id="candName" placeholder="Enter name...">
                    </div>
                    <div>
                        <label>ASSIGN POST</label>
                        <select id="postSelect">
                            <option value="">-- Select Position --</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-maroon" onclick="saveCandidate()" style="margin-top: 15px;">Add Candidate</button>

                <div class="scroll-list" id="candList"></div>
            </div>
        </div>
    </div>

    <script>
        const API_CANDIDATES = 'https://kbhs.onrender.com/api/candidates';
        const API_POSTS = 'https://kbhs.onrender.com/api/posts';

        let deleteTarget = { id: null, type: null };

        function notify(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<span>⚡</span> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function openConfirm(id, type) {
            deleteTarget = { id, type };
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        document.getElementById('confirmBtn').onclick = async () => {
            const url = deleteTarget.type === 'post' ? API_POSTS : API_CANDIDATES;
            try {
                await fetch(`${url}/${deleteTarget.id}`, { method: 'DELETE' });
                notify("Entry Deleted Successfully");
                closeModal();
                loadData();
            } catch (e) { notify("Error deleting entry"); }
        };

        async function loadData() {
            try {
                const [pRes, cRes] = await Promise.all([fetch(API_POSTS), fetch(API_CANDIDATES)]);
                const posts = await pRes.json();
                const cands = await cRes.json();

                // Update Post Section
                const postList = document.getElementById('postList');
                const postSelect = document.getElementById('postSelect');
                postList.innerHTML = '';
                postSelect.innerHTML = '<option value="">-- Select Position --</option>';
                posts.forEach(p => {
                    postList.innerHTML += `<div class="list-item"><span><b>${p.name}</b></span><span class="del-btn" onclick="openConfirm('${p._id}', 'post')">&times;</span></div>`;
                    postSelect.innerHTML += `<option value="${p.name}">${p.name}</option>`;
                });

                // Update Candidate Section
                const candList = document.getElementById('candList');
                candList.innerHTML = '';
                cands.forEach(c => {
                    candList.innerHTML += `<div class="list-item"><span><b>${c.name}</b> <small style="color:var(--green)">(${c.post})</small></span><span class="del-btn" onclick="openConfirm('${c._id}', 'candidate')">&times;</span></div>`;
                });
            } catch (e) { console.error("Load failed", e); }
        }

        async function savePost() {
            const name = document.getElementById('postInput').value.trim();
            if(!name) return notify("Enter position name!");
            await fetch(API_POSTS, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name })});
            document.getElementById('postInput').value = '';
            notify("Position saved to server");
            loadData();
        }

        async function saveCandidate() {
            const name = document.getElementById('candName').value.trim();
            const post = document.getElementById('postSelect').value;
            if(!name || !post) return notify("Fill all candidate fields!");
            await fetch(API_CANDIDATES, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, post })});
            document.getElementById('candName').value = '';
            notify("Candidate added to server");
            loadData();
        }

        loadData();
    </script>
</body>
</html>
