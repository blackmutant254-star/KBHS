<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT182QjOZmHaUdd56SiVgSFx14YvNEuzOUS7A&s">
    <title>Kivaywa Boys | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --maroon: #800000;
            --maroon-hover: #5d0000;
            --green: #006400;
            --black: #0f172a;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.95);
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(at top left, #f8fafc, #f1f5f9);
            color: var(--black);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- TOAST SYSTEM --- */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
        .toast {
            background: var(--white);
            color: var(--black);
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-lg);
            border-left: 5px solid var(--maroon);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 300px;
            font-weight: 600;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* --- LAYOUT --- */
        .container { width: 100%; max-width: 900px; }

        .nav-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .btn {
            cursor: pointer;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: 0.2s all;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
        }

        .btn-primary { background: var(--maroon); color: white; border: none; }
        .btn-primary:hover { background: var(--maroon-hover); transform: translateY(-1px); }

        .card {
            background: var(--glass);
            border-radius: 20px;
            padding: 32px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--white);
            backdrop-filter: blur(10px);
        }

        header h2 { font-size: 1.8rem; color: var(--maroon); font-weight: 800; }
        .subtitle { color: var(--green); text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: 800; margin-bottom: 30px; }

        /* --- FORM STYLING --- */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 150px;
            gap: 16px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .input-box label { display: block; font-size: 0.75rem; font-weight: 800; color: #64748b; margin-bottom: 6px; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1.5px solid var(--border);
            font-size: 0.95rem;
            outline: none;
            background: white;
        }
        input:focus { border-color: var(--maroon); ring: 2px var(--maroon); }

        /* --- CANDIDATE LIST --- */
        .list-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        #searchBox { width: 250px; padding: 8px 15px; border-radius: 20px; }

        .candidate-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .candidate-card {
            background: white;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid var(--border);
            position: relative;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .candidate-card:hover { border-color: var(--maroon); box-shadow: var(--shadow-md); transform: translateY(-3px); }

        .c-name { font-weight: 800; color: var(--black); font-size: 1.1rem; }
        .c-post { font-size: 0.75rem; color: var(--green); font-weight: 700; margin-top: 4px; }
        
        .btn-trash {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #fff1f2;
            color: #e11d48;
            border: none;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0;
            transition: 0.2s;
        }
        .candidate-card:hover .btn-trash { opacity: 1; }

        /* Empty State */
        .empty-state { text-align: center; padding: 40px; color: #94a3b8; grid-column: 1 / -1; }

        /* --- PRINT --- */
        #printSection { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection { display: block; position: absolute; left: 0; top: 0; width: 100%; padding: 40px; }
            table { width: 100%; border-collapse: collapse; margin-top: 30px; }
            th, td { border: 1px solid #000; padding: 12px; text-align: left; }
        }

        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="container">
        <div class="nav-header">
            <a href="dash.html" class="btn" style="background: white;">← Dashboard</a>
            <button onclick="window.print()" class="btn btn-primary">🖨️ Generate Reports</button>
        </div>

        <div class="card">
            <header>
                <h2>Election Portal</h2>
                <p class="subtitle">Kivaywa Boys Senior School Registry</p>
            </header>

            <div class="form-row">
                <div class="input-box">
                    <label>CANDIDATE NAME</label>
                    <input type="text" id="candName" placeholder="Full legal name...">
                </div>
                <div class="input-box">
                    <label>POST CATEGORY</label>
                    <select id="candPost">
                        <option value="School Captain">School Captain</option>
                        <option value="Deputy Captain">Deputy Captain</option>
                        <option value="Dining Hall Prefect">Dining Hall Prefect</option>
                        <option value="Games Prefect">Games Prefect</option>
                        <option value="Entertainment Prefect">Entertainment Prefect</option>
                        <option value="Environment Prefect">Environment Prefect</option>
                        <option value="Library Prefect">Library Prefect</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="height: 46px; align-self: flex-end;" onclick="registerCandidate()">Add Member</button>
            </div>

            <div class="list-controls">
                <h3 style="font-size: 0.9rem;">Board of Candidates (<span id="count">0</span>)</h3>
                <input type="text" id="searchBox" placeholder="Quick search..." oninput="filterCandidates()">
            </div>

            <div class="candidate-grid" id="displayList">
                </div>
        </div>
    </div>

    <div id="printSection">
        <h1 style="text-align: center;">KIVAYWA BOYS SENIOR SCHOOL</h1>
        <h2 style="text-align: center; color: #555;">2026 OFFICIAL CANDIDATE BALLOT LIST</h2>
        <p style="text-align: center;">Generated on: <span id="printDate"></span></p>
        <table id="printTable">
            <thead>
                <tr>
                    <th>S/N</th>
                    <th>Candidate Full Name</th>
                    <th>Post applied for</th>
                    <th>Verification Signature</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const API_URL = 'https://kbhs.onrender.com/api/candidates';
        let candidates = [];

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<span>${msg}</span><button style="background:none;border:none;cursor:pointer" onclick="this.parentElement.remove()">✕</button>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function fetchCandidates() {
            try {
                const res = await fetch(API_URL);
                candidates = await res.json();
                renderUI(candidates);
            } catch (err) {
                showToast("Connection Error: Check server.");
            }
        }

        function renderUI(data) {
            const grid = document.getElementById('displayList');
            const tableBody = document.querySelector('#printTable tbody');
            const count = document.getElementById('count');
            document.getElementById('printDate').innerText = new Date().toLocaleString();
            
            grid.innerHTML = '';
            tableBody.innerHTML = '';
            count.innerText = data.length;

            if (data.length === 0) {
                grid.innerHTML = '<div class="empty-state">No candidates found in the registry.</div>';
                return;
            }

            data.forEach((c, idx) => {
                // Card UI
                const card = document.createElement('div');
                card.className = 'candidate-card';
                card.innerHTML = `
                    <span class="c-name">${c.name}</span>
                    <span class="c-post">${c.post}</span>
                    <button class="btn-trash" onclick="removeCandidate('${c._id}')">Delete</button>
                `;
                grid.appendChild(card);

                // Print Table
                const row = `<tr><td>${idx+1}</td><td>${c.name}</td><td>${c.post}</td><td></td></tr>`;
                tableBody.innerHTML += row;
            });
        }

        async function registerCandidate() {
            const name = document.getElementById('candName').value.trim();
            const post = document.getElementById('candPost').value;
            if (!name) return showToast("Name is required!");

            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, post })
            });

            if (res.ok) {
                document.getElementById('candName').value = '';
                showToast("Candidate Added Successfully");
                fetchCandidates();
            }
        }

        async function removeCandidate(id) {
            if (!confirm("Are you sure?")) return;
            const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showToast("Entry Deleted");
                fetchCandidates();
            }
        }

        function filterCandidates() {
            const term = document.getElementById('searchBox').value.toLowerCase();
            const filtered = candidates.filter(c => 
                c.name.toLowerCase().includes(term) || 
                c.post.toLowerCase().includes(term)
            );
            renderUI(filtered);
        }

        fetchCandidates();
    </script>
</body>
</html>
