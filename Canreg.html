<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT182QjOZmHaUdd56SiVgSFx14YvNEuzOUS7A&s">
    <title>Kivaywa Boys | Candidate Registry</title>
    <style>
        :root {
            --maroon: #800000;
            --maroon-light: #a52a2a;
            --green: #006400;
            --black: #1a1a1a;
            --gray-bg: #f4f7f6;
            --white: #ffffff;
            --border: #e0e0e0;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--gray-bg);
            margin: 0;
            padding: 20px;
            color: var(--black);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- TOAST SYSTEM --- */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            min-width: 250px;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideInRight 0.4s ease forwards;
        }

        .toast.success { background: var(--green); border-left: 6px solid #00ff00; }
        .toast.error { background: var(--maroon); border-left: 6px solid #ff4d4d; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* --- NAVIGATION --- */
        .nav-header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .nav-btn {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: var(--black);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .nav-btn:hover { background: var(--maroon); color: white; transform: translateY(-2px); }

        /* --- MAIN CARD --- */
        .registry-card {
            width: 100%;
            max-width: 800px;
            background: var(--white);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border-top: 6px solid var(--maroon);
        }

        h2 { margin: 0; color: var(--maroon); text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { color: var(--green); font-weight: 700; font-size: 0.8rem; margin-bottom: 25px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            margin-bottom: 30px;
            align-items: flex-end;
        }

        .input-group label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 0.8rem; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--maroon); box-shadow: 0 0 0 3px rgba(128,0,0,0.1); }

        .btn-add {
            background: var(--maroon);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            height: 48px;
        }

        /* --- CANDIDATE LIST --- */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--gray-bg);
        }

        .candidate-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .candidate-item {
            background: var(--gray-bg);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--green);
            position: relative;
            transition: 0.3s;
        }

        .candidate-item:hover { transform: scale(1.02); background: #ebf0ee; }

        .c-name { display: block; font-weight: 800; color: var(--maroon); margin-bottom: 4px; }
        .c-post { display: block; font-size: 0.75rem; color: #666; font-weight: 600; text-transform: uppercase; }

        .btn-del {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .btn-del:hover { color: #ff4d4d; }

        /* --- PRINT SECTION --- */
        #printSection { display: none; }

        @media print {
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection { 
                display: block; 
                position: absolute; 
                left: 0; top: 0; 
                width: 100%; 
                padding: 40px;
            }
            .print-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            .print-table th, .print-table td { border: 1px solid black; padding: 10px; text-align: left; }
        }

        /* Responsive Fixes */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .nav-header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="nav-header">
        <a href="dash.html" class="nav-btn"><span>←</span> Dashboard</a>
        <button onclick="window.print()" class="nav-btn" style="background: var(--black); color: white;">🖨️ Print Registry</button>
    </div>

    <div class="registry-card">
        <h2>Candidate Registry</h2>
        <p class="subtitle">Kivaywa Boys Senior School • Electoral Management</p>

        <div class="form-grid">
            <div class="input-group">
                <label>Candidate Name</label>
                <input type="text" id="candName" placeholder="Enter Full Name">
            </div>
            <div class="input-group">
                <label>Elective Post</label>
                <select id="candPost">
                    <option value="School Captain">School Captain</option>
                    <option value="Assistant School Captain">Assistant School Captain</option>
                    <option value="Dining Hall Prefect">Dining Hall Prefect</option>
                    <option value="Games Prefect">Games Prefect</option>
                    <option value="Entertainment Prefect">Entertainment Prefect</option>
                    <option value="Environment Prefect">Environment Prefect</option>
                </select>
            </div>
            <button class="btn-add" onclick="registerCandidate()">Add Candidate</button>
        </div>

        <div class="list-header">
            <h3 style="margin:0; font-size: 1rem;">Active Candidates</h3>
            <span id="candCount" style="background: var(--maroon); color:white; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem;">0 Total</span>
        </div>

        <div class="candidate-grid" id="displayList">
            </div>
    </div>

    <div id="printSection">
        <center>
            <h1>KIVAYWA BOYS SENIOR SCHOOL</h1>
            <h3>OFFICIAL REGISTERED CANDIDATE LIST - 2026</h3>
            <hr>
        </center>
        <table class="print-table" id="printTableBody">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Full Name</th>
                    <th>Elective Position</th>
                    <th>Signature/Clearance</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const API_URL = 'https://kbhs.onrender.com/api/candidates';
        let allCandidates = [];

        // TOAST SYSTEM
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${msg}</span><span style="margin-left:15px;cursor:pointer" onclick="this.parentElement.remove()">×</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function fetchCandidates() {
            try {
                const response = await fetch(API_URL);
                allCandidates = await response.json();
                updateUI();
            } catch (err) {
                showToast("Server Connection Failed", "error");
            }
        }

        async function registerCandidate() {
            const nameInput = document.getElementById('candName');
            const postSelect = document.getElementById('candPost');
            const name = nameInput.value.trim();
            const post = postSelect.value;

            if (!name) {
                showToast("Please enter a name", "error");
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, post })
                });

                if (response.ok) {
                    showToast(`${name} registered successfully!`);
                    nameInput.value = '';
                    fetchCandidates();
                }
            } catch (err) {
                showToast("Failed to save candidate", "error");
            }
        }

        function updateUI() {
            const listDiv = document.getElementById('displayList');
            const printTable = document.querySelector('#printTableBody tbody');
            const countSpan = document.getElementById('candCount');
            
            listDiv.innerHTML = '';
            printTable.innerHTML = '';
            countSpan.innerText = `${allCandidates.length} Total`;

            allCandidates.forEach((c, index) => {
                // UI Grid
                const item = document.createElement('div');
                item.className = 'candidate-item';
                item.innerHTML = `
                    <span class="c-name">${c.name}</span>
                    <span class="c-post">${c.post}</span>
                    <button class="btn-del" onclick="removeCandidate('${c._id}')">&times;</button>
                `;
                listDiv.appendChild(item);

                // Print Table
                const row = `<tr>
                    <td>${index + 1}</td>
                    <td>${c.name}</td>
                    <td>${c.post}</td>
                    <td>________________</td>
                </tr>`;
                printTable.innerHTML += row;
            });
        }

        async function removeCandidate(id) {
            if(!confirm("De-register this candidate?")) return;
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast("Candidate removed", "success");
                    fetchCandidates();
                }
            } catch (err) {
                showToast("Delete failed", "error");
            }
        }

        fetchCandidates();
    </script>
</body>
</html>
