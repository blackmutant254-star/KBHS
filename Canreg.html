<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT182QjOZmHaUdd56SiVgSFx14YvNEuzOUS7A&s">
    <title>Kivaywa Boys | Election Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --maroon: #800000;
            --maroon-hover: #5d0000;
            --green: #006400;
            --black: #0f172a;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.95);
            --border: #e2e8f0;
            --danger: #e11d48;
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(at top left, #f8fafc, #f1f5f9);
            color: var(--black);
            padding: 20px;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 1000px; margin: 0 auto; }

        /* --- TOAST SYSTEM --- */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
        .toast {
            background: var(--white);
            color: var(--black);
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-lg);
            border-left: 5px solid var(--green);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 280px;
            font-weight: 600;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* --- MODAL SYSTEM --- */
        #modalOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }
        .modal { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .modal h3 { margin-bottom: 15px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }

        /* --- LAYOUT --- */
        .nav-header { display: flex; justify-content: space-between; margin-bottom: 24px; }
        .card { background: var(--glass); border-radius: 20px; padding: 32px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid var(--white); margin-bottom: 20px; }
        
        header { text-align: center; margin-bottom: 30px; }
        header h2 { font-size: 1.8rem; color: var(--maroon); font-weight: 800; }
        .subtitle { color: var(--green); text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: 800; }

        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

        .btn { cursor: pointer; border-radius: 10px; font-weight: 700; padding: 12px 18px; transition: 0.2s; border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .btn-primary { background: var(--maroon); color: white; border: none; }
        .btn-success { background: var(--green); color: white; border: none; }

        .input-box { margin-bottom: 15px; }
        .input-box label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border); outline: none; }

        /* --- LISTS --- */
        .scroll-list { max-height: 300px; overflow-y: auto; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8fafc; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border); }
        .list-item span { font-weight: 700; font-size: 0.9rem; }
        .delete-icon { color: var(--danger); cursor: pointer; font-weight: 800; padding: 5px; }

        @media (max-width: 850px) { .admin-grid { grid-template-columns: 1fr; } }
        
        #printSection { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection { display: block; position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="modalOverlay">
        <div class="modal">
            <h3>Confirm Deletion</h3>
            <p>This action cannot be undone. Remove this entry?</p>
            <div class="modal-btns">
                <button style="background:#e2e8f0" onclick="closeModal()">Cancel</button>
                <button style="background:var(--danger); color:white" id="confirmActionBtn">Confirm</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="nav-header">
            <a href="dash.html" class="btn" style="background: white;">← Dashboard</a>
            <button onclick="window.print()" class="btn btn-primary">🖨️ Generate Reports</button>
        </div>

        <header class="card">
            <h2>Election Portal</h2>
            <p class="subtitle">Management Console</p>
        </header>

        <div class="admin-grid">
            <div class="card">
                <h3 style="margin-bottom: 20px; font-size: 1rem;">1. Position Registry</h3>
                <div class="input-box">
                    <label>NEW POSITION NAME</label>
                    <input type="text" id="newPostName" placeholder="e.g. Dining Hall Prefect">
                </div>
                <button class="btn btn-success" style="width: 100%;" onclick="addPost()">Register Position</button>
                
                <div class="scroll-list" id="postDisplayList">
                    </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 20px; font-size: 1rem;">2. Member Registry</h3>
                <div class="input-box">
                    <label>CANDIDATE FULL NAME</label>
                    <input type="text" id="candName" placeholder="Enter student name...">
                </div>
                <div class="input-box">
                    <label>SELECT POSITION</label>
                    <select id="candPostSelect">
                        <option value="">-- Choose Position --</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="registerCandidate()">Add Candidate</button>

                <div class="scroll-list" id="candDisplayList">
                    </div>
            </div>
        </div>
    </div>

    <div id="printSection">
        <h1 style="text-align: center;">KIVAYWA BOYS SENIOR SCHOOL</h1>
        <h2 style="text-align: center;">2026 OFFICIAL CANDIDATE LIST</h2>
        <table style="width: 100%; border-collapse: collapse; margin-top: 20px;" border="1">
            <thead>
                <tr><th>#</th><th>Name</th><th>Position</th><th>Signature</th></tr>
            </thead>
            <tbody id="printTableBody"></tbody>
        </table>
    </div>

    <script>
        const API_CANDIDATES = 'https://kbhs.onrender.com/api/candidates';
        const API_POSTS = 'https://kbhs.onrender.com/api/posts'; // Ensure your backend has this route

        let allPosts = [];
        let allCandidates = [];
        let pendingAction = { id: null, type: null };

        // UI HELPERS
        function showToast(msg, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if(isError) toast.style.borderLeftColor = 'var(--danger)';
            toast.innerHTML = `<span>${msg}</span><button style="background:none;border:none;cursor:pointer;margin-left:10px" onclick="this.parentElement.remove()">✕</button>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function openModal(id, type) {
            pendingAction = { id, type };
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        document.getElementById('confirmActionBtn').onclick = function() {
            if (pendingAction.type === 'post') deletePost(pendingAction.id);
            if (pendingAction.type === 'candidate') deleteCandidate(pendingAction.id);
            closeModal();
        };

        // --- POSTS LOGIC ---
        async function fetchPosts() {
            try {
                const res = await fetch(API_POSTS);
                allPosts = await res.json();
                renderPosts();
            } catch (e) { showToast("Posts API Error", true); }
        }

        async function addPost() {
            const name = document.getElementById('newPostName').value.trim();
            if (!name) return showToast("Enter a position name", true);
            
            const res = await fetch(API_POSTS, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            });

            if (res.ok) {
                document.getElementById('newPostName').value = '';
                showToast("New position added");
                fetchPosts();
            }
        }

        function renderPosts() {
            const list = document.getElementById('postDisplayList');
            const select = document.getElementById('candPostSelect');
            list.innerHTML = '';
            select.innerHTML = '<option value="">-- Choose Position --</option>';

            allPosts.forEach(p => {
                list.innerHTML += `<div class="list-item"><span>${p.name}</span><div class="delete-icon" onclick="openModal('${p._id}', 'post')">✕</div></div>`;
                select.innerHTML += `<option value="${p.name}">${p.name}</option>`;
            });
        }

        async function deletePost(id) {
            const res = await fetch(`${API_POSTS}/${id}`, { method: 'DELETE' });
            if (res.ok) { showToast("Position removed"); fetchPosts(); }
        }

        // --- CANDIDATE LOGIC ---
        async function fetchCandidates() {
            try {
                const res = await fetch(API_CANDIDATES);
                allCandidates = await res.json();
                renderCandidates();
            } catch (e) { showToast("Candidate API Error", true); }
        }

        async function registerCandidate() {
            const name = document.getElementById('candName').value.trim();
            const post = document.getElementById('candPostSelect').value;
            if (!name || !post) return showToast("Name and Position required!", true);

            const res = await fetch(API_CANDIDATES, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, post })
            });

            if (res.ok) {
                document.getElementById('candName').value = '';
                showToast("Candidate registered successfully");
                fetchCandidates();
            }
        }

        function renderCandidates() {
            const list = document.getElementById('candDisplayList');
            const printBody = document.getElementById('printTableBody');
            list.innerHTML = '';
            printBody.innerHTML = '';

            allCandidates.forEach((c, i) => {
                list.innerHTML += `<div class="list-item"><div><b>${c.name}</b><br><small style="color:var(--green)">${c.post}</small></div><div class="delete-icon" onclick="openModal('${c._id}', 'candidate')">✕</div></div>`;
                printBody.innerHTML += `<tr><td>${i+1}</td><td>${c.name}</td><td>${c.post}</td><td></td></tr>`;
            });
        }

        async function deleteCandidate(id) {
            const res = await fetch(`${API_CANDIDATES}/${id}`, { method: 'DELETE' });
            if (res.ok) { showToast("Candidate deleted"); fetchCandidates(); }
        }

        // INIT
        fetchPosts();
        fetchCandidates();
    </script>
</body>
</html>
